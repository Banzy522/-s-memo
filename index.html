<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面談記録</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111110">
</head>
<body>
    <header class="header">
        <h1>面談記録</h1>
        <button id="addBtn">+追加</button>
    </header>

    <section class="filters">
        <input type="text" id="searchInput" placeholder="名前検索">
        <select id="personFilter">
            <option value="">全員</option>
        </select>
        <select id="typeFilter">
            <option value="">すべての種別</option>
            <option value="1on1">1on1</option>
            <option value="review">評価面談</option>
            <option value="goal">目標設定</option>
            <option value="other">その他</option>
        </select>
        <select id="sortFilter">
            <option value="new">新しい順</option>
            <option value="old">古い順</option>
            <option value="name">名前順</option>
        </select>
    </section>

    <section id="stats"></section>
    <main id="recordList"></main>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>面談記録</h2>
            <input type="date" id="formDate">
            <input type="text" id="formName" placeholder="名前">
            <input type="text" id="formPlace" placeholder="場所">
            <select id="formType">
                <option value="1on1">1on1</option>
                <option value="review">評価面談</option>
                <option value="goal">目標設定</option>
                <option value="other">その他</option>
            </select>
            <textarea id="formMemo" placeholder="メモ"></textarea>
            <div class="modal-actions">
                <button id="saveBtn">保存</button>
                <button id="cancelBtn">閉じる</button>
            </div>
        </div>
    </div>

    <script src="storage.js"></script>
    <script src="filters.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
